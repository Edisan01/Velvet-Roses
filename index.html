<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VelvetRoses Wien</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#8B9A6E; font-family:'Georgia',serif; overflow-x:hidden; }

#hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

#rose-container {
  width:400px;
  height:400px;
  opacity:0;
  transform:translateY(80px) rotate(-180deg) scale(0.3);
  transition:all 1.4s cubic-bezier(0.34,1.56,0.64,1);
}
#rose-container.visible {
  opacity:1;
  transform:translateY(0) rotate(0deg) scale(1);
}

#rose-canvas { width:100%; height:100%; display:block; }

.hero-text {
  position:absolute;
  top:15%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  color:white;
  opacity:0;
  transition:opacity 1s ease 0.5s;
}
.hero-text.visible { opacity:1; }
.hero-text h1 {
  font-size:clamp(2.5rem,5vw,4.5rem);
  font-weight:300;
  letter-spacing:0.05em;
}
.hero-text h1 em { font-style:italic; }

.scroll-hint {
  position:absolute;
  bottom:2rem;
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.6);
  font-size:0.8rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  animation:bounce 2s infinite;
}
@keyframes bounce {
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(8px)}
}
</style>
</head>
<body>

<section id="hero">
  <div class="hero-text" id="heroText">
    <h1>Blumen, die <em>Herzen</em> berühren.</h1>
  </div>

  <div id="rose-container">
    <canvas id="rose-canvas"></canvas>
  </div>

  <div class="scroll-hint">↓ Scrollen</div>
</section>

<script>
// ── THREE.JS ROSE ──
const canvas = document.getElementById('rose-canvas');
const container = document.getElementById('rose-container');
const w = 400, h = 400;

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 0.5, 3.5);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const dir = new THREE.DirectionalLight(0xfff0e0, 2.5);
dir.position.set(2, 4, 3); scene.add(dir);
const fill = new THREE.DirectionalLight(0xe8d0c0, 1);
fill.position.set(-2, 1, -2); scene.add(fill);

// Load GLB
const loader = new THREE.FileLoader();
loader.setResponseType('arraybuffer');

let roseModel = null;
let autoAngle = 0;
let isSpinning = false;

// Use GLTFLoader from CDN
const script = document.createElement('script');
script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
script.onload = () => {
  const gltfLoader = new THREE.GLTFLoader();
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  
  gltfLoader.load(base + 'rose.glb', (gltf) => {
    roseModel = gltf.scene;
    
    const box = new THREE.Box3().setFromObject(roseModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    roseModel.position.sub(center);
    roseModel.scale.setScalar(2.2 / Math.max(size.x, size.y, size.z));
    scene.add(roseModel);
    
    // Start render loop
    animate();
    
    // Trigger entrance after short delay
    setTimeout(() => {
      document.getElementById('heroText').classList.add('visible');
      container.classList.add('visible');
      isSpinning = true;
    }, 300);
    
  }, undefined, (err) => {
    console.error('GLB Error:', err);
  });
};
document.head.appendChild(script);

// Render loop
function animate() {
  requestAnimationFrame(animate);
  if (roseModel) {
    autoAngle += 0.006;
    roseModel.rotation.y = autoAngle;
  }
  renderer.render(scene, camera);
}
</script>
</body>
</html>
